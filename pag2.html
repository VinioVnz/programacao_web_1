<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 2</title>
</head>

<body>
    <a href="index.html">Ir para pagina inicial</a>
    <a href="index.html#link-googlee">Ir para pagina inicial e google</a>

    <form action="#" method="post">
        <label for="login">Login</label>
        <input type="text" name="login" id="login" placeholder="Informe o login" required autofocus maxlength="15">
        <br>
        <br>
        <label for="password">Senha</label>
        <input type="password" name="password" id="password" placeholder="Informe a senha" required>
        <br>
        <br>
        <label for="endereco">Endereço</label>
        <input type="text" name="endereco" id="endereco" placeholder="Informe o endereço" required size="50">
        <br>
        <br>
        <label for="pais">Informe o país</label>
        <input type="text" name="pais" id="pais" size="4" pattern="[A-Za-z]{3}" title="Código de país com 3 caracteres"
            maxlength="3">
        <br>
        <br>
        <label for="cpf">CPF:</label>
        <input type="text" name="cpf" id="cpf" maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
            title="CPF no formato: 000.000.000-00">
        <br>
        <br>
        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade">
        <br>
        <br>
        <input type="text" name="campo1" value="valor1" readonly>
        <input type="text" name="campo2" disabled value="valor2">
        <input type="hidden" name="campo3" value="valor3">

        <p>
            <input type="date" name="data" id="data">
            <input type="time" name="tempo" id="tempo">
            <input type="datetime-local" name="datetime" id="datetime">
            <input type="month" name="mes">
            <input type="week" name="week">
            <br>
            <label for="remember">Lembrar User</label>
            <input type="checkbox" name="remember" id="remember" value="S" checked>
            <br>
            <label for="cidade">Blumenau: </label>
            <input type="radio" name="cidade" id="cidade1" value="BNU" checked>
            <label for="cidade">Gaspar: </label>
            <input type="radio" name="cidade" id="cidade2" value="GPR">
            <label for="cidade">Indaial: </label>
            <input type="radio" name="cidade" id="cidade3" value="IND">
            <br>
            <label for="estado"></label>
            <select name="estado" id="estado">
                <option value="PR">Paraná</option>
                <option value="SC">Santa Catarina</option>
                <option value="RS">Rio grande do sul</option>
            </select>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>

</html>
