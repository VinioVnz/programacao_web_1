<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color: rgb(9, 5, 47);

            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container{
            font-size: 10px;

            width: 40em;
            height: 40em;
            position: relative;

        }
        .sol{
            position: absolute;
            background-color: yellow;
            width: 10em;
            height: 10em;
            border-radius: 50%;
            top: 15em;
            left: 15em;

            box-shadow: 0 0 3em orange;
        }

        .terra, .lua{
            position: absolute;
            border-color: white transparent transparent transparent;
            border-width: 0.1em 0.1em 0 0;
            border-style: solid;
            border-radius: 50%;
        }

        .terra{
            width: 30em;
            height: 30em;
            top: 5em;
            left: 5em;
            animation: orbita 36.5s linear infinite;
        }

        .terra::before, .lua::before{
            content: "";
            /* color: white; */ 
            position: absolute;
            border-radius: 50%;
        }

        .terra::before{
            top: 2.8em;
            right: 2.8em;
            width: 3em;
            height: 3em;
            background-color: aqua;
        }

        .lua::before{
            top: 0.8em;
            right: 0.2em;
            width: 1.2em;
            height: 1.2em;
            background-color: silver;

        }

        .lua{
            width: 8em;
            height: 8em;
            top: 0;
            right: 0;
            animation: orbita 2.7s linear infinite;
        }
        
        @keyframes orbita {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sol"></div>
        <div class="terra">
            <div class="lua"></div>
        </div>

    </div>
</body>

</html>
