<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Grid</title>
    <style>
        .flex_container{
            background-color: rgb(128, 255, 0);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-evenly;
            height: 100vh;

        }
        .flex_container > div{
            background-color: cornflowerblue;
            margin: 5px;
            text-align: center;
            padding: 5px;
            width: 100px;
            font-size: 2em;
            height: 50px;
            
        }

        .grid_container{
            background-color: red;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            justify-content: center;
            height: 100vh;
            align-content: center;
            
        }

        .grid_container > div{
            background-color: green;
            /* margin: 10px; */
            font-size: 2em;
            text-align: center;
            width: 100%;
        }
        
        .grid_container2{
            background-color: gray;
            display: grid;
            gap: 5px;
        }

        .grid_container2 > div{
            background-color: lightblue;
            text-align: center;
            font-size: 2em;
        }

        @media (max-width: 600px){
            .grid_container2{
                grid-template-columns: 1fr;
            }
        }
        @media (min-width: 601px){
            .grid_container2{
                grid-template-columns: 1fr 1fr;
            }
        }


    </style>
</head>

<body>
    <main>
        <div class="flex_container">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
        </div>
        <div class="grid_container">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
        </div>
        <div class="grid_container2">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
        </div>
    </main>
</body>

</html>
